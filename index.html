
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合宿 出欠・食数管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
  :root { --blue:#3a86c8; --green:#4caf7d; --red:#e05a5a; --bg:#f0f7ff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'M PLUS Rounded 1c',sans-serif; background:var(--bg); min-height:100vh; }
  .nav { display:flex; background:#fff; border-bottom:2px solid #e0ecf8; position:sticky; top:0; z-index:10; }
  .nav button { flex:1; padding:14px 0; border:none; background:transparent; font-family:inherit; font-size:13px; font-weight:700; color:#aaa; cursor:pointer; }
  .nav button.active { color:var(--blue); border-bottom:3px solid var(--blue); margin-bottom:-2px; }
  .page { padding:14px 12px; display:flex; flex-direction:column; gap:12px; max-width:480px; margin:0 auto; }
  .card { background:#fff; border-radius:16px; padding:16px; box-shadow:0 2px 12px rgba(58,134,200,.1); }
  .hero { background:linear-gradient(135deg,var(--blue),#5ba8e8); border-radius:16px; padding:24px 20px; color:#fff; text-align:center; }
  .hero .emoji { font-size:48px; margin-bottom:8px; }
  .hero h1 { font-size:22px; font-weight:900; margin-bottom:4px; }
  .hero p { font-size:13px; opacity:.85; }
  .sec-title { font-size:14px; font-weight:900; color:var(--blue); margin-bottom:10px; }
  .member-grid { display:flex; flex-wrap:wrap; gap:8px; }
  .member-btn { padding:10px 14px; border:2px solid #d0e4f5; border-radius:10px; background:#fff; font-family:inherit; font-size:13px; font-weight:700; color:#2a3a4a; cursor:pointer; }
  .member-btn.done { background:#e8f7ef; border-color:var(--green); color:#2d6a4f; }
  .toggle-row { display:flex; gap:8px; }
  .ton { flex:1; padding:12px 0; border:none; border-radius:10px; background:var(--green); color:#fff; font-family:inherit; font-size:15px; font-weight:900; cursor:pointer; }
  .ton.red { background:var(--red); }
  .toff { flex:1; padding:12px 0; border:2px solid #d0e4f5; border-radius:10px; background:#fff; color:#aaa; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; }
  .date-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .date-label { font-size:13px; font-weight:700; color:#555; min-width:80px; }
  .mon { padding:8px 14px; border:none; border-radius:8px; background:var(--green); color:#fff; font-family:inherit; font-size:13px; font-weight:900; cursor:pointer; }
  .moff { padding:8px 14px; border:2px solid #d0e4f5; border-radius:8px; background:#fff; color:#bbb; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-primary { padding:14px; border:none; border-radius:12px; background:var(--blue); color:#fff; font-family:inherit; font-size:15px; font-weight:900; cursor:pointer; width:100%; margin-top:8px; }
  .back-btn { width:36px; height:36px; border:2px solid #d0e4f5; border-radius:10px; background:#fff; font-size:18px; cursor:pointer; color:var(--blue); }
  .form-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .progress-bar { height:8px; background:#e8f0f8; border-radius:4px; overflow:hidden; margin-bottom:4px; }
  .progress-fill { height:100%; background:var(--blue); border-radius:4px; }
  .summary-grid { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .sbox { flex:1; min-width:60px; text-align:center; padding:10px 8px; border:2px solid; border-radius:12px; background:#fafcff; }
  .snum { font-size:22px; font-weight:900; }
  .slbl { font-size:11px; color:#888; margin-top:2px; }
  .mcard { background:#f0f7ff; border-radius:10px; padding:10px 16px; text-align:center; min-width:64px; }
  .mnum { font-size:26px; font-weight:900; color:var(--blue); line-height:1.2; }
  .mlbl { font-size:11px; color:#888; }
  .mrow { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid #f0f4f8; flex-wrap:wrap; gap:6px; }
  .sbadge { font-size:11px; padding:2px 8px; border-radius:6px; font-weight:700; margin-left:6px; }
  .refresh-btn { padding:6px 14px; border:1.5px solid #d0e4f5; border-radius:8px; background:#fff; font-family:inherit; font-size:12px; font-weight:700; color:var(--blue); cursor:pointer; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2a3a4a; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:700; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; }
  input[type=text] { padding:8px 12px; border:1.5px solid #d0e4f5; border-radius:8px; font-family:inherit; font-size:13px; outline:none; }
  .setting-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f0f4f8; font-size:14px; }
  .chip { display:inline-flex; align-items:center; gap:4px; padding:5px 10px; background:#f0f6ff; border-radius:8px; border:1.5px solid #d0e4f5; font-size:12px; }
  .chip-x { border:none; background:none; cursor:pointer; color:#aaa; font-size:14px; padding:0; line-height:1; }
  .btn-small { padding:8px 14px; border:none; border-radius:8px; background:var(--blue); color:#fff; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .rbtn { border:none; background:#fdf0f0; color:var(--red); border-radius:6px; padding:2px 7px; cursor:pointer; font-weight:700; font-size:13px; }
</style>
</head>
<body>

<script>
const SUPABASE_URL = "https://rvuqydpsnlhmrxvdiewd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2dXF5ZHBzbmxobXJ4dmRpZXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTQxMzQsImV4cCI6MjA5MzUzMDEzNH0.5HN-0DNia4qu414ZXLDlBfHhcn8FWUjSpDDkH2Z0y2c";

const DEFAULT_CONFIG = {
  title: "2025年 夏合宿",
  dates: ["7/26(土)", "7/27(日)", "7/28(月)"],
  meals: {
    "7/26(土)": { 朝:false, 昼:true, 夕:true },
    "7/27(日)": { 朝:true,  昼:true, 夕:true },
    "7/28(月)": { 朝:true,  昼:true, 夕:false },
  },
  members: ["田中 太郎", "鈴木 花子", "佐藤 健"],
};
const ML = ["朝","昼","夕"];

let DB, cfg, responses = {}, curView = "answer", selMember = null, selAttend = true, selMeals = {};

window.addEventListener("DOMContentLoaded", async () => {
  document.getElementById("app").innerHTML = "<div style='display:flex;justify-content:center;align-items:center;height:80vh;flex-direction:column;gap:12px;color:#888;font-size:14px'>🏕️<br>読み込み中...</div>";
  DB = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  cfg = await loadCfg();
  await loadRes();
  render();
});

async function loadCfg() {
  try {
    const { data } = await DB.from("config").select("value").eq("key","camp_config").maybeSingle();
    return data ? JSON.parse(data.value) : JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
}
async function saveCfg() {
  try { await DB.from("config").upsert({key:"camp_config",value:JSON.stringify(cfg)},{onConflict:"key"}); } catch(e){console.error(e);}
}
async function loadRes() {
  try {
    const { data, error } = await DB.from("responses").select("*");
    if (error) { console.error("loadRes error", error); return; }
    responses = {};
    (data||[]).forEach(r => { responses[r.member] = r; });
  } catch(e) { console.error(e); }
}
async function saveRes(member, attend, meals) {
  const payload = {member, attend, meals, updated_at: new Date().toISOString()};
  const { error } = await DB.from("responses").upsert(payload, {onConflict:"member"});
  if (error) { console.error("saveRes error", error); return false; }
  responses[member] = payload;
  return true;
}

function showView(v) {
  curView = v;
  document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
  document.getElementById("nav-"+v).classList.add("active");
  render();
}

function render() {
  const el = document.getElementById("app");
  if (curView==="answer")   el.innerHTML = renderAnswer();
  if (curView==="admin")    el.innerHTML = renderAdmin();
  if (curView==="settings") el.innerHTML = renderSettings();
  bindEvents();
}

function renderAnswer() {
  if (!selMember) {
    const btns = cfg.members.map(m => {
      const done = !!responses[m];
      return `<button class="member-btn${done?' done':''}" data-m="${m}">${done?'✅ ':''}${m}</button>`;
    }).join("");
    return `<div class="page">
      <div class="hero"><div class="emoji">🏕️</div><h1>${cfg.title}</h1><p>出欠・食事の確認</p></div>
      <div class="card"><div class="sec-title">あなたの名前を選んでください</div>
      <div class="member-grid">${btns}</div></div></div>`;
  }
  const rows = cfg.dates.map(date => {
    const avail = ML.filter(ml => cfg.meals[date]?.[ml]);
    if (!avail.length) return "";
    const btns = avail.map(ml => {
      const key = `${date}_${ml}`, on = selAttend && selMeals[key];
      return `<button class="${on?'mon':'moff'} mt" data-key="${key}">${ml}</button>`;
    }).join("");
    return `<div class="date-row"><span class="date-label">${date}</span><div style="display:flex;gap:6px">${btns}</div></div>`;
  }).join("");
  return `<div class="page"><div class="card">
    <div class="form-header">
      <button class="back-btn" id="backBtn">←</button>
      <div><div style="font-size:18px;font-weight:900">${selMember}</div><div style="font-size:12px;color:#888">回答フォーム</div></div>
    </div>
    <div style="margin-bottom:16px">
      <div class="sec-title">参加しますか？</div>
      <div class="toggle-row">
        <button class="${selAttend?'ton':'toff'}" id="attY">参加する ✓</button>
        <button class="${!selAttend?'ton red':'toff'}" id="attN">不参加 ✗</button>
      </div>
    </div>
    ${selAttend?`<div style="margin-bottom:16px"><div class="sec-title">食事の確認（緑＝食べる）</div>${rows}</div>`:''}
    <button class="btn-primary" id="submitBtn">送信する →</button>
  </div></div>`;
}

function renderAdmin() {
  const total=cfg.members.length, answered=cfg.members.filter(m=>responses[m]).length;
  const attending=cfg.members.filter(m=>responses[m]?.attend).length;
  const absent=cfg.members.filter(m=>responses[m]&&!responses[m].attend).length;
  const pct=total?Math.round(answered/total*100):0;
  const mealCards=cfg.dates.map(date=>{
    const avail=ML.filter(ml=>cfg.meals[date]?.[ml]); if(!avail.length)return"";
    const cards=avail.map(ml=>{
      const key=`${date}_${ml}`, count=cfg.members.filter(m=>responses[m]?.attend&&responses[m]?.meals?.[key]).length;
      return `<div class="mcard"><div class="mlbl">${ml}食</div><div class="mnum">${count}</div><div class="mlbl">人</div></div>`;
    }).join("");
    return `<div style="margin-bottom:12px"><div class="date-label">${date}</div><div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">${cards}</div></div>`;
  }).join("");
  const mrows=cfg.members.map(m=>{
    const r=responses[m];
    let badge=`<span class="sbadge" style="background:#f5f5f5;color:#aaa">未回答</span>`,tags="";
    if(r){
      badge=r.attend?`<span class="sbadge" style="background:#e8f7ef;color:#2d6a4f">参加</span>`:`<span class="sbadge" style="background:#fdf0f0;color:#e05a5a">不参加</span>`;
      if(r.attend)tags=cfg.dates.map(d=>ML.filter(ml=>cfg.meals[d]?.[ml]).map(ml=>{
        const key=`${d}_${ml}`,on=r.meals?.[key];
        return `<span style="font-size:10px;padding:2px 5px;border-radius:4px;font-weight:700;background:${on?'#4caf7d':'#f0f0f0'};color:${on?'white':'#bbb'}">${ml}</span>`;
      }).join("")).join("");
    }
    return `<div class="mrow"><div style="flex:1"><span style="font-size:13px;font-weight:700">${m}</span>${badge}</div><div style="display:flex;gap:4px;flex-wrap:wrap">${tags}</div></div>`;
  }).join("");
  return `<div class="page">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="sec-title">📊 回答状況</div><button class="refresh-btn" id="refreshBtn">更新</button>
      </div>
      <div class="summary-grid">
        <div class="sbox" style="border-color:#3a86c8"><div class="snum" style="color:#3a86c8">${answered}/${total}</div><div class="slbl">回答済</div></div>
        <div class="sbox" style="border-color:#4caf7d"><div class="snum" style="color:#4caf7d">${attending}</div><div class="slbl">参加</div></div>
        <div class="sbox" style="border-color:#e05a5a"><div class="snum" style="color:#e05a5a">${absent}</div><div class="slbl">不参加</div></div>
        <div class="sbox" style="border-color:#aaa"><div class="snum" style="color:#aaa">${total-answered}</div><div class="slbl">未回答</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:#888;text-align:right;margin-top:4px">${answered}/${total}人 回答済</div>
    </div>
    <div class="card"><div class="sec-title">🍱 食数集計</div>${mealCards}</div>
    <div class="card"><div class="sec-title">👥 個人一覧</div>${mrows}</div>
  </div>`;
}

function renderSettings() {
  const dateRows=cfg.dates.map(d=>{
    const mbtns=ML.map(ml=>{
      const on=cfg.meals[d]?.[ml];
      return `<button class="${on?'mon':'moff'} mst" data-date="${d}" data-meal="${ml}">${ml}</button>`;
    }).join("");
    return `<div style="padding:10px 0;border-bottom:1px solid #f0f4f8">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-weight:700;font-size:14px">${d}</span>
        <button class="rbtn rdate" data-date="${d}">×</button>
      </div><div style="display:flex;gap:8px">${mbtns}</div></div>`;
  }).join("");
  const chips=cfg.members.map(m=>`<div class="chip">${m}<button class="chip-x rmember" data-m="${m}">×</button></div>`).join("");
  return `<div class="page">
    <div class="card">
      <div class="sec-title">⚙️ 基本設定</div>
      <div class="setting-row"><span>合宿名</span><input type="text" id="s-title" value="${cfg.title}" style="width:160px"></div>
      <div style="margin-top:8px"><button class="btn-small" id="saveBasic">保存</button></div>
    </div>
    <div class="card">
      <div class="sec-title">📅 日程・食事</div>${dateRows}
      <div style="display:flex;gap:8px;margin-top:10px">
        <input type="text" id="new-date" placeholder="例: 7/29(火)" style="flex:1">
        <button class="btn-small" id="addDate">＋追加</button>
      </div>
    </div>
    <div class="card">
      <div class="sec-title">👥 メンバー（${cfg.members.length}人）</div>
      <div class="member-grid" style="margin-bottom:12px">${chips}</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="new-member" placeholder="名前" style="flex:1">
        <button class="btn-small" id="addMember">＋追加</button>
      </div>
    </div>
  </div>`;
}

function bindEvents() {
  document.querySelectorAll(".member-btn").forEach(b=>b.addEventListener("click",()=>{
    selMember=b.dataset.m;
    const r=responses[selMember];
    selAttend=r?r.attend:true;
    selMeals=r?.meals?{...r.meals}:initMeals(true);
    render();
  }));
  document.getElementById("backBtn")?.addEventListener("click",()=>{selMember=null;render();});
  document.getElementById("attY")?.addEventListener("click",()=>{selAttend=true;selMeals=initMeals(true);render();});
  document.getElementById("attN")?.addEventListener("click",()=>{selAttend=false;selMeals=initMeals(false);render();});
  document.querySelectorAll(".mt").forEach(b=>b.addEventListener("click",()=>{selMeals[b.dataset.key]=!selMeals[b.dataset.key];render();}));
  document.getElementById("submitBtn")?.addEventListener("click",async()=>{
    const btn=document.getElementById("submitBtn");
    btn.textContent="送信中..."; btn.disabled=true;
    const ok=await saveRes(selMember,selAttend,selMeals);
    if(ok){toast(`${selMember} の回答を送信しました 🎉`);selMember=null;render();}
    else{toast("送信失敗。もう一度お試しください");btn.textContent="送信する →";btn.disabled=false;}
  });
  document.getElementById("refreshBtn")?.addEventListener("click",async()=>{await loadRes();render();toast("更新しました");});
  document.getElementById("saveBasic")?.addEventListener("click",async()=>{
    cfg.title=document.getElementById("s-title").value;await saveCfg();toast("保存しました ✅");render();
  });
  document.getElementById("addDate")?.addEventListener("click",async()=>{
    const v=document.getElementById("new-date").value.trim();
    if(!v||cfg.dates.includes(v))return;
    cfg.dates.push(v);cfg.meals[v]={朝:true,昼:true,夕:true};await saveCfg();render();
  });
  document.querySelectorAll(".rdate").forEach(b=>b.addEventListener("click",async()=>{
    cfg.dates=cfg.dates.filter(x=>x!==b.dataset.date);delete cfg.meals[b.dataset.date];await saveCfg();render();
  }));
  document.querySelectorAll(".mst").forEach(b=>b.addEventListener("click",async()=>{
    cfg.meals[b.dataset.date][b.dataset.meal]=!cfg.meals[b.dataset.date][b.dataset.meal];await saveCfg();render();
  }));
  document.getElementById("addMember")?.addEventListener("click",async()=>{
    const v=document.getElementById("new-member").value.trim();
    if(!v||cfg.members.includes(v))return;
    cfg.members.push(v);await saveCfg();render();
  });
  document.querySelectorAll(".rmember").forEach(b=>b.addEventListener("click",async()=>{
    cfg.members=cfg.members.filter(x=>x!==b.dataset.m);await saveCfg();render();
  }));
}

function initMeals(on){
  const m={};
  cfg.dates.forEach(d=>ML.forEach(ml=>{if(cfg.meals[d]?.[ml])m[`${d}_${ml}`]=on;}));
  return m;
}
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}
</script>

<nav class="nav">
  <button id="nav-answer" class="active" onclick="showView('answer')">✏️ 回答</button>
  <button id="nav-admin" onclick="showView('admin')">📊 集計</button>
  <button id="nav-settings" onclick="showView('settings')">⚙️ 設定</button>
</nav>
<div id="app"></div>
<div class="toast" id="toast"></div>

</body>
</html>
