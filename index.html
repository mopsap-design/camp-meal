<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合宿 出欠・食数管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
  :root {
    --blue: #3a86c8; --blue-dark: #2563a8; --green: #4caf7d;
    --red: #e05a5a; --gray: #8899aa; --bg: #f0f7ff; --white: #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'M PLUS Rounded 1c', sans-serif; background: var(--bg); min-height: 100vh; }
  .nav { display: flex; background: #fff; border-bottom: 2px solid #e0ecf8; position: sticky; top: 0; z-index: 10; }
  .nav button { flex: 1; padding: 14px 0; border: none; background: transparent; font-family: inherit; font-size: 13px; font-weight: 700; color: #aaa; cursor: pointer; }
  .nav button.active { color: var(--blue); border-bottom: 3px solid var(--blue); margin-bottom: -2px; }
  .page { padding: 14px 12px; display: flex; flex-direction: column; gap: 12px; max-width: 480px; margin: 0 auto; }
  .card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 2px 12px rgba(58,134,200,0.1); }
  .hero { background: linear-gradient(135deg, var(--blue), #5ba8e8); border-radius: 16px; padding: 24px 20px; color: #fff; text-align: center; box-shadow: 0 4px 16px rgba(58,134,200,0.25); }
  .hero .emoji { font-size: 48px; margin-bottom: 8px; }
  .hero h1 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .hero p { font-size: 13px; opacity: 0.85; }
  .sec-title { font-size: 14px; font-weight: 900; color: var(--blue); margin-bottom: 10px; }
  .member-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .member-btn { padding: 10px 14px; border: 2px solid #d0e4f5; border-radius: 10px; background: #fff; font-family: inherit; font-size: 13px; font-weight: 700; color: #2a3a4a; cursor: pointer; }
  .member-btn.done { background: #e8f7ef; border-color: var(--green); color: #2d6a4f; }
  .toggle-row { display: flex; gap: 8px; }
  .toggle-on  { flex: 1; padding: 12px 0; border: none; border-radius: 10px; background: var(--green); color: #fff; font-family: inherit; font-size: 15px; font-weight: 900; cursor: pointer; }
  .toggle-on.red { background: var(--red); }
  .toggle-off { flex: 1; padding: 12px 0; border: 2px solid #d0e4f5; border-radius: 10px; background: #fff; color: #aaa; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
  .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .date-label { font-size: 13px; font-weight: 700; color: #555; min-width: 80px; }
  .meal-btn-on  { padding: 8px 14px; border: none; border-radius: 8px; background: var(--green); color: #fff; font-family: inherit; font-size: 13px; font-weight: 900; cursor: pointer; }
  .meal-btn-off { padding: 8px 14px; border: 2px solid #d0e4f5; border-radius: 8px; background: #fff; color: #bbb; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-primary { padding: 14px 24px; border: none; border-radius: 12px; background: var(--blue); color: #fff; font-family: inherit; font-size: 15px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 8px; }
  .back-btn { width: 36px; height: 36px; border: 2px solid #d0e4f5; border-radius: 10px; background: #fff; font-size: 18px; cursor: pointer; color: var(--blue); }
  .form-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .member-name { font-size: 18px; font-weight: 900; }
  .progress-bar { height: 8px; background: #e8f0f8; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 4px; transition: width .5s; }
  .summary-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .summary-box { flex: 1; min-width: 60px; text-align: center; padding: 10px 8px; border: 2px solid; border-radius: 12px; background: #fafcff; }
  .summary-num { font-size: 22px; font-weight: 900; }
  .summary-lbl { font-size: 11px; color: #888; margin-top: 2px; }
  .meal-count-card { background: #f0f7ff; border-radius: 10px; padding: 10px 16px; text-align: center; min-width: 64px; }
  .meal-count-num { font-size: 26px; font-weight: 900; color: var(--blue); line-height: 1.2; }
  .meal-count-lbl { font-size: 11px; color: #888; }
  .member-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f4f8; flex-wrap: wrap; gap: 6px; }
  .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 700; margin-left: 6px; }
  .refresh-btn { padding: 6px 14px; border: 1.5px solid #d0e4f5; border-radius: 8px; background: #fff; font-family: inherit; font-size: 12px; font-weight: 700; color: var(--blue); cursor: pointer; }
  .empty { text-align: center; padding: 32px 0; color: #aaa; font-size: 14px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2a3a4a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .hidden { display: none; }
  .loader { display: flex; justify-content: center; align-items: center; height: 60px; color: #aaa; font-size: 14px; }
  input[type=text], input[type=date], input[type=number] {
    padding: 8px 12px; border: 1.5px solid #d0e4f5; border-radius: 8px;
    font-family: inherit; font-size: 13px; outline: none;
  }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f4f8; font-size: 14px; }
  .setting-row:last-child { border-bottom: none; }
  .chip { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; background: #f0f6ff; border-radius: 8px; border: 1.5px solid #d0e4f5; font-size: 12px; }
  .chip-remove { border: none; background: none; cursor: pointer; color: #aaa; font-size: 14px; padding: 0; line-height: 1; }
  .btn-small { padding: 8px 14px; border: none; border-radius: 8px; background: var(--blue); color: #fff; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .remove-btn { border: none; background: #fdf0f0; color: var(--red); border-radius: 6px; padding: 2px 7px; cursor: pointer; font-weight: 700; font-size: 13px; }
</style>
</head>
<body>

<!-- ========== ここを書き換えてください ========== -->
<script>
  const SUPABASE_URL = "rvuqydpsnlhmrxvdiewd";    ← SupabaseのProject URLに書き換え
  const SUPABASE_KEY = "sb_publishable_evHWJDVFsYAHe8rUJDxUfQ_z8ASf_1v";    ← Supabaseのanon公開キーに書き換え
</script>
<!-- ============================================= -->

<script>
// ====== 設定 ======
const DEFAULT_CONFIG = {
  title: "2025年 夏合宿",
  dates: ["7/26(土)", "7/27(日)", "7/28(月)"],
  meals: {
    "7/26(土)": { 朝: false, 昼: true,  夕: true  },
    "7/27(日)": { 朝: true,  昼: true,  夕: true  },
    "7/28(月)": { 朝: true,  昼: true,  夕: false },
  },
  members: ["田中 太郎", "鈴木 花子", "佐藤 健"],
};
const MEAL_LABELS = ["朝", "昼", "夕"];
const CONFIG_KEY = "camp_config";

let supabase, config = null, responses = {};
let currentView = "answer";
let currentMember = null, currentAttend = true, currentMeals = {};

// ====== 初期化 ======
window.addEventListener("DOMContentLoaded", async () => {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  config = loadLocalConfig();
  await fetchResponses();
  render();
});

function loadLocalConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || DEFAULT_CONFIG; } catch { return DEFAULT_CONFIG; }
}
function saveLocalConfig(cfg) {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
  config = cfg;
}

async function fetchResponses() {
  try {
    const { data } = await supabase.from("responses").select("*");
    responses = {};
    (data || []).forEach(r => { responses[r.member] = r; });
  } catch(e) { console.error(e); }
}

async function upsertResponse(member, attend, meals) {
  const payload = { member, attend, meals, updated_at: new Date().toISOString() };
  await supabase.from("responses").upsert(payload, { onConflict: "member" });
  responses[member] = payload;
}

// ====== ナビ ======
function showView(v) {
  currentView = v;
  document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
  document.getElementById("nav-" + v).classList.add("active");
  render();
}

// ====== レンダリング ======
function render() {
  const main = document.getElementById("main");
  if (currentView === "answer")  main.innerHTML = renderAnswer();
  if (currentView === "admin")   { main.innerHTML = renderAdmin(); }
  if (currentView === "settings") main.innerHTML = renderSettings();
  attachEvents();
}

// ====== 回答画面 ======
function renderAnswer() {
  if (!currentMember) return renderMemberSelect();
  return renderForm();
}

function renderMemberSelect() {
  const btns = config.members.map(m => {
    const done = !!responses[m];
    return `<button class="member-btn${done?' done':''}" data-member="${m}">${done?'✅ ':''}${m}</button>`;
  }).join("");
  return `
    <div class="page">
      <div class="hero"><div class="emoji">🏕️</div><h1>${config.title}</h1><p>出欠・食事の確認</p></div>
      <div class="card">
        <div class="sec-title">あなたの名前を選んでください</div>
        <div class="member-grid">${btns}</div>
      </div>
    </div>`;
}

function renderForm() {
  const m = currentMember;
  const attend = currentAttend;
  const mealRows = config.dates.map(date => {
    const avail = MEAL_LABELS.filter(ml => config.meals[date]?.[ml]);
    if (!avail.length) return "";
    const btns = avail.map(ml => {
      const key = `${date}_${ml}`;
      const on = attend && currentMeals[key];
      return `<button class="${on?'meal-btn-on':'meal-btn-off'} meal-toggle" data-key="${key}">${ml}</button>`;
    }).join("");
    return `<div class="date-row"><span class="date-label">${date}</span><div style="display:flex;gap:6px">${btns}</div></div>`;
  }).join("");

  return `
    <div class="page">
      <div class="card">
        <div class="form-header">
          <button class="back-btn" id="backBtn">←</button>
          <div><div class="member-name">${m}</div><div style="font-size:12px;color:#888">回答フォーム</div></div>
        </div>
        <div style="margin-bottom:16px">
          <div class="sec-title">参加しますか？</div>
          <div class="toggle-row">
            <button class="${attend?'toggle-on':'toggle-off'}" id="attendYes">参加する ✓</button>
            <button class="${!attend?'toggle-on red':'toggle-off'}" id="attendNo">不参加 ✗</button>
          </div>
        </div>
        ${attend ? `<div style="margin-bottom:16px"><div class="sec-title">食事の確認（緑＝食べる）</div>${mealRows}</div>` : ""}
        <button class="btn-primary" id="submitBtn">送信する →</button>
      </div>
    </div>`;
}

// ====== 集計画面 ======
function renderAdmin() {
  const total = config.members.length;
  const answered = config.members.filter(m => responses[m]).length;
  const attending = config.members.filter(m => responses[m]?.attend).length;
  const absent = config.members.filter(m => responses[m] && !responses[m].attend).length;
  const unanswered = total - answered;

  const mealCards = config.dates.map(date => {
    const avail = MEAL_LABELS.filter(ml => config.meals[date]?.[ml]);
    if (!avail.length) return "";
    const cards = avail.map(ml => {
      const key = `${date}_${ml}`;
      const count = config.members.filter(m => responses[m]?.attend && responses[m]?.meals?.[key]).length;
      return `<div class="meal-count-card"><div class="meal-count-lbl">${ml}食</div><div class="meal-count-num">${count}</div><div class="meal-count-lbl">人</div></div>`;
    }).join("");
    return `<div style="margin-bottom:12px"><div class="date-label">${date}</div><div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">${cards}</div></div>`;
  }).join("");

  const memberRows = config.members.map(m => {
    const r = responses[m];
    let badge = `<span class="status-badge" style="background:#f5f5f5;color:#aaa">未回答</span>`;
    let mealTags = "";
    if (r) {
      badge = r.attend
        ? `<span class="status-badge" style="background:#e8f7ef;color:#2d6a4f">参加</span>`
        : `<span class="status-badge" style="background:#fdf0f0;color:#e05a5a">不参加</span>`;
      if (r.attend) {
        mealTags = config.dates.map(d =>
          MEAL_LABELS.filter(ml => config.meals[d]?.[ml]).map(ml => {
            const key = `${d}_${ml}`;
            const on = r.meals?.[key];
            return `<span style="font-size:10px;padding:2px 5px;border-radius:4px;font-weight:700;background:${on?'#4caf7d':'#f0f0f0'};color:${on?'white':'#bbb'}">${ml}</span>`;
          }).join("")
        ).join("");
      }
    }
    return `<div class="member-row"><div style="flex:1"><span style="font-size:13px;font-weight:700">${m}</span>${badge}</div><div style="display:flex;gap:4px;flex-wrap:wrap">${mealTags}</div></div>`;
  }).join("");

  const pct = total ? Math.round(answered/total*100) : 0;
  return `
    <div class="page">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="sec-title">📊 回答状況</div>
          <button class="refresh-btn" id="refreshBtn">更新</button>
        </div>
        <div class="summary-grid">
          <div class="summary-box" style="border-color:#3a86c8"><div class="summary-num" style="color:#3a86c8">${answered}/${total}</div><div class="summary-lbl">回答済</div></div>
          <div class="summary-box" style="border-color:#4caf7d"><div class="summary-num" style="color:#4caf7d">${attending}</div><div class="summary-lbl">参加</div></div>
          <div class="summary-box" style="border-color:#e05a5a"><div class="summary-num" style="color:#e05a5a">${absent}</div><div class="summary-lbl">不参加</div></div>
          <div class="summary-box" style="border-color:#aaa"><div class="summary-num" style="color:#aaa">${unanswered}</div><div class="summary-lbl">未回答</div></div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:#888;text-align:right;margin-top:4px">${answered}/${total}人 回答済</div>
      </div>
      <div class="card"><div class="sec-title">🍱 食数集計</div>${mealCards}</div>
      <div class="card"><div class="sec-title">👥 個人一覧</div>${memberRows}</div>
    </div>`;
}

// ====== 設定画面 ======
function renderSettings() {
  const dateRows = config.dates.map(d => {
    const mealBtns = MEAL_LABELS.map(ml => {
      const on = config.meals[d]?.[ml];
      return `<button class="${on?'meal-btn-on':'meal-btn-off'} meal-setting-toggle" data-date="${d}" data-meal="${ml}">${ml}</button>`;
    }).join("");
    return `<div style="padding:10px 0;border-bottom:1px solid #f0f4f8">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-weight:700;font-size:14px">${d}</span>
        <button class="remove-btn remove-date" data-date="${d}">×</button>
      </div>
      <div style="display:flex;gap:8px">${mealBtns}</div>
    </div>`;
  }).join("");

  const chips = config.members.map(m =>
    `<div class="chip">${m}<button class="chip-remove remove-member" data-member="${m}">×</button></div>`
  ).join("");

  return `
    <div class="page">
      <div class="card">
        <div class="sec-title">⚙️ 基本設定</div>
        <div class="setting-row">
          <span>合宿名</span>
          <input type="text" id="s-title" value="${config.title}" style="width:160px">
        </div>
        <div style="margin-top:8px"><button class="btn-small" id="saveBasic">保存</button></div>
      </div>
      <div class="card">
        <div class="sec-title">📅 日程・食事</div>
        ${dateRows}
        <div style="display:flex;gap:8px;margin-top:10px">
          <input type="text" id="new-date" placeholder="例: 7/29(火)" style="flex:1">
          <button class="btn-small" id="addDate">＋追加</button>
        </div>
      </div>
      <div class="card">
        <div class="sec-title">👥 メンバー（${config.members.length}人）</div>
        <div class="member-grid" style="margin-bottom:12px">${chips}</div>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-member" placeholder="名前" style="flex:1">
          <button class="btn-small" id="addMember">＋追加</button>
        </div>
      </div>
    </div>`;
}

// ====== イベント ======
function attachEvents() {
  // メンバー選択
  document.querySelectorAll(".member-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const m = btn.dataset.member;
      currentMember = m;
      const r = responses[m];
      currentAttend = r ? r.attend : true;
      currentMeals = r?.meals ? { ...r.meals } : initMeals(true);
      render();
    });
  });

  // 戻るボタン
  document.getElementById("backBtn")?.addEventListener("click", () => {
    currentMember = null; render();
  });

  // 出欠
  document.getElementById("attendYes")?.addEventListener("click", () => {
    currentAttend = true; currentMeals = initMeals(true); render();
  });
  document.getElementById("attendNo")?.addEventListener("click", () => {
    currentAttend = false; currentMeals = initMeals(false); render();
  });

  // 食事トグル
  document.querySelectorAll(".meal-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const key = btn.dataset.key;
      currentMeals[key] = !currentMeals[key];
      render();
    });
  });

  // 送信
  document.getElementById("submitBtn")?.addEventListener("click", async () => {
    await upsertResponse(currentMember, currentAttend, currentMeals);
    showToast(`${currentMember} の回答を送信しました 🎉`);
    currentMember = null;
    render();
  });

  // 更新
  document.getElementById("refreshBtn")?.addEventListener("click", async () => {
    await fetchResponses();
    render();
    showToast("最新データを取得しました");
  });

  // 設定：基本
  document.getElementById("saveBasic")?.addEventListener("click", () => {
    config.title = document.getElementById("s-title").value;
    saveLocalConfig(config);
    showToast("保存しました");
    render();
  });

  // 設定：日程追加
  document.getElementById("addDate")?.addEventListener("click", () => {
    const v = document.getElementById("new-date").value.trim();
    if (!v || config.dates.includes(v)) return;
    config.dates.push(v);
    config.meals[v] = { 朝: true, 昼: true, 夕: true };
    saveLocalConfig(config); render();
  });

  // 設定：日程削除
  document.querySelectorAll(".remove-date").forEach(btn => {
    btn.addEventListener("click", () => {
      const d = btn.dataset.date;
      config.dates = config.dates.filter(x => x !== d);
      delete config.meals[d];
      saveLocalConfig(config); render();
    });
  });

  // 設定：食事トグル
  document.querySelectorAll(".meal-setting-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const d = btn.dataset.date, ml = btn.dataset.meal;
      config.meals[d][ml] = !config.meals[d][ml];
      saveLocalConfig(config); render();
    });
  });

  // 設定：メンバー追加
  document.getElementById("addMember")?.addEventListener("click", () => {
    const v = document.getElementById("new-member").value.trim();
    if (!v || config.members.includes(v)) return;
    config.members.push(v);
    saveLocalConfig(config); render();
  });

  // 設定：メンバー削除
  document.querySelectorAll(".remove-member").forEach(btn => {
    btn.addEventListener("click", () => {
      config.members = config.members.filter(x => x !== btn.dataset.member);
      saveLocalConfig(config); render();
    });
  });
}

function initMeals(on) {
  const m = {};
  config.dates.forEach(d => {
    MEAL_LABELS.forEach(ml => {
      if (config.meals[d]?.[ml]) m[`${d}_${ml}`] = on;
    });
  });
  return m;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>

<nav class="nav">
  <button id="nav-answer" class="active" onclick="showView('answer')">✏️ 回答</button>
  <button id="nav-admin" onclick="showView('admin')">📊 集計</button>
  <button id="nav-settings" onclick="showView('settings')">⚙️ 設定</button>
</nav>
<div id="main"></div>
<div class="toast" id="toast"></div>

</body>
</html>
